services:

  mongo:
    image: mongo:7
    container_name: vision_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: vision_redis
    ports:
      - "6379:6379"

  opencv-ai:
    build: ./opencv-ai
    container_name: vision_ai
    ports:
      - "10000:10000"
    env_file:
      - ./opencv-ai/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/')"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s

  backend:
    build: ./backend
    container_name: vision_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - OPENCV_VERIFY_URL=http://opencv-ai:10000/verify
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      opencv-ai:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: vision_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      backend:
        condition: service_started

volumes:
  mongo_data:
