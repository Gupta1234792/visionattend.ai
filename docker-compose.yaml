services:

  opencv-ai:
    build: ./opencv-ai
    container_name: vision_ai
    ports:
      - "8000:8000"
    env_file:
      - ./opencv-ai/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build: ./backend
    container_name: vision_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - OPENCV_VERIFY_URL=http://opencv-ai:8000/verify
    depends_on:
      - opencv-ai

  frontend:
    build: ./frontend
    container_name: vision_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
