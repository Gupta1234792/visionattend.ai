services:

  opencv-ai:
    build: ./opencv-ai
    container_name: vision_ai
    ports:
      - "8000:8000"
    env_file:
      - ./opencv-ai/.env

  backend:
    build: ./backend
    container_name: vision_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - opencv-ai

  frontend:
    build: ./frontend
    container_name: vision_frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend